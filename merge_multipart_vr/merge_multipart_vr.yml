name: Merge Multipart VR Scenes
description: Merges split scene files and applies Multipart/VR tags.
version: "1.13-44e0b4a"
url: "https://github.com/ponponbon/ponponbon-stash-plugins"

exec:
  - python3
  - "{pluginDir}/merge_multipart_vr.py"

interface: raw

tasks:
  - name: Preview
    description: Show planned merges without writing anything.
    defaultArgs:
      mode: preview

  - name: Merge Multipart Scenes
    description: Merge detected multipart scenes.
    defaultArgs:
      mode: merge

settings:
  api_key:
    displayName: API Key
    description: Optional. Use when Stash API auth is enabled.
    type: STRING

  stash_url:
    displayName: Stash URL
    description: Optional GraphQL URL override.
    type: STRING

  vr_tag:
    displayName: VR Tag Name
    description: Defaults to VR.
    type: STRING

  multipart_tag:
    displayName: Multipart Tag Name
    description: Defaults to Multipart.
    type: STRING

  vr_only:
    displayName: VR Scenes Only
    description: Only merge scenes already tagged as VR.
    type: BOOLEAN

  merge_delay_ms:
    displayName: Delay Between Merges (ms)
    description: Defaults to 200.
    type: NUMBER
