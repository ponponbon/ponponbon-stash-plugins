name: "Create Missing Performers"
description: Creates missing local performers from identified stash-box scenes.
version: "1.2"
url: https://github.com/ponponbon/ponponbon-stash-plugins

exec:
  - python3
  - "{pluginDir}/create_missing_performers.py"

interface: raw

tasks:
  - name: "Create Missing Performers"
    description: Add missing performers and attach them to their scenes.
    defaultArgs:
      mode: "live"

  - name: "Preview"
    description: Show planned performer and scene updates.
    defaultArgs:
      mode: "dry_run"

settings:
  api_key:
    displayName: API Key
    description: Optional. Use when Stash API auth is enabled.
    type: STRING
