name: "Extrafanart Gallery Linker"
description: Links extrafanart folders to parent scene galleries.
version: "1.15"
url: https://github.com/ponponbon/ponponbon-stash-plugins

exec:
  - python3
  - "{pluginDir}/extrafanart_gallery.py"

interface: raw

tasks:
  - name: "Link Galleries"
    description: Create or reuse extrafanart galleries and link them to scenes.
    defaultArgs:
      mode: "link"

  - name: "Preview"
    description: Show planned changes without writing anything.
    defaultArgs:
      mode: "dry_run"

settings:
  api_key:
    displayName: API Key
    description: Optional. Use when Stash API auth is enabled.
    type: STRING

  stash_url:
    displayName: Stash URL
    description: Optional GraphQL URL override.
    type: STRING

  refresh_existing:
    displayName: Refresh Existing Galleries
    description: Re-check galleries that are already linked.
    type: BOOLEAN
