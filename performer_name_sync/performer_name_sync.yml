name: "Performer Name Sync"
description: Syncs performer names and metadata across JavStash and StashDB.
version: "1.24-df4964f"
url: https://github.com/ponponbon/ponponbon-stash-plugins

exec:
  - python3
  - "{pluginDir}/performer_name_sync.py"

interface: raw

tasks:
  - name: "Sync Performer Names"
    description: Rename, enrich, repair, and deduplicate performers.
    defaultArgs:
      mode: "live"

  - name: "Preview"
    description: Show planned performer updates and merges.
    defaultArgs:
      mode: "dry_run"

settings:
  api_key:
    displayName: API Key
    description: Optional. Use when Stash API auth is enabled.
    type: STRING
